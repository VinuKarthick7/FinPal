server {
  listen 80;
  server_name localhost;
  root /usr/share/nginx/html;
  index index.html;

  # Allow Razorpay/Sardine iframe permissions to suppress console warnings
  add_header Permissions-Policy "accelerometer=(self \"https://api.razorpay.com\" \"https://api.sardine.ai\"), gyroscope=(self \"https://api.razorpay.com\" \"https://api.sardine.ai\"), magnetometer=(self), payment=(self \"https://api.razorpay.com\")" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location /api/ {
    proxy_pass http://server:5000/api/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
