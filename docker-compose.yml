version: '3.8'
services:
  server:
    build:
      context: ./server
    env_file:
      - ./server/.env
    environment:
      NODE_ENV: production
      PORT: 5000
      # Ensure the app uses the in-cluster Mongo service instead of localhost
      MONGODB_URI: mongodb://mongo:27017/finpal
      CLIENT_URL: http://localhost:3000
      SERVER_URL: http://localhost:5000
    ports:
      - "127.0.0.1:5000:5000"
    volumes:
      - ./server/uploads:/app/uploads
    depends_on:
      - mongo
    restart: unless-stopped

  client:
    build:
      context: ./client
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - server
    restart: unless-stopped

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
